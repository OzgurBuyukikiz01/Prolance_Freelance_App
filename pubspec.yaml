name: prolance_app
description: "Prolance Freelancing Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  smooth_page_indicator: ^1.2.0+3
  iconsax: ^0.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  provider: ^6.1.2
  go_router: ^14.8.1
  animate_do: ^3.3.4
  flutter_staggered_grid_view: ^0.7.0
  readmore: ^3.0.0
  image_picker: ^1.1.2
  percent_indicator: ^4.2.3
  flutter_rating_bar: ^4.0.1
  timeago: ^3.7.0
  badges: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
