# Prolance — Supabase local configuration
# Run: supabase start (requires Supabase CLI)
# https://supabase.com/docs/guides/cli

project_id = "cgxzpdhcaxiopdylwstr"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ['./seed.sql']

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"
image_transformation = { enabled = true }

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
# Mobile OAuth callback (io.prolance.app://login-callback) must also be added in Supabase Dashboard → Auth → URL Configuration.
additional_redirect_urls = [
  "http://localhost:3000",
  "http://127.0.0.1:54321",
  "io.prolance.app://login-callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false
enable_confirmations = false

# Google OAuth — set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET in .env (local) and enable Google in Supabase Dashboard → Auth → Providers.
[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"

[edge_runtime]
enabled = true
inspector_port = 8083
policy = "per_worker"

[functions.escrow]
verify_jwt = true

[functions.agora-token]
verify_jwt = true

[functions.send-push]
verify_jwt = false
